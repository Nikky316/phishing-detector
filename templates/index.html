<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing URL Detector</title>

    <!-- Prevent Caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #0b1e2d;
            color: white;
            font-family: "Segoe UI", sans-serif;
        }

        h2 {
            color: #ffffff !important;
            font-weight: bold;
        }

        .card {
            background: #112b3c;
            border: 1px solid #1f4068;
            border-radius: 12px;
            padding: 28px;
        }

        .btn-custom {
            background-color: #1f8a70;
            color: white;
        }

        .btn-custom:hover {
            background-color: #28b9a4;
        }

        .result {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .safe { color: #00ff99; }
        .suspicious { color: #ffdd57; }
        .phishing { color: #ff4b5c; }

        .progress {
            height: 12px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .explain-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 25px;
        }

        .explain-box h5 {
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .explain-box ul li {
            color: #e6e6e6;
            margin-bottom: 6px;
        }
    </style>
</head>

<script>
    // Remove query parameters on page load to prevent refresh from keeping results
    if (window.location.search.length > 0) {
        window.history.replaceState({}, document.title, window.location.pathname);
    }
</script>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="col-md-6">
            <div class="card shadow">

                <h2 class="text-center mb-4">🔍 Phishing URL Detector</h2>

                <!-- URL Input -->
                <form method="post">
                    <div class="input-group mb-3">
                        <input type="text"
                               name="url"
                               class="form-control"
                               placeholder="Enter URL"
                               value="{{ request.form.url if request.method == 'POST' else '' }}"
                               required>
                        <button class="btn btn-custom">Check</button>
                    </div>
                </form>

                <!-- RESULT BLOCK -->
                {% if result %}
                    <p class="result 
                        {% if 'SAFE' in result %}safe{% elif 'SUSPICIOUS' in result %}suspicious{% else %}phishing{% endif %}">
                        {{ result | safe }}
                    </p>
                {% endif %}

                <!-- RISK BAR -->
                {% if result %}
                <div class="progress">
                    {% if "SAFE" in result %}
                        <div class="progress-bar bg-success" style="width: 25%;"></div>
                    {% elif "SUSPICIOUS" in result %}
                        <div class="progress-bar bg-warning" style="width: 75%;"></div>
                    {% else %}
                        <div class="progress-bar bg-danger" style="width: 100%;"></div>
                    {% endif %}
                </div>
                {% endif %}

                <!-- EXPLANATION -->
                {% if reasons %}
                <div class="explain-box">
                    <h5>🔍 Why this result?</h5>
                    <ul>
                        {% for r in reasons %}
                            <li>{{ r }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
